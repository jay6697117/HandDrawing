<h2>🎨 你想要哪种界面风格？</h2>
<p class="subtitle">选择你最喜欢的视觉方向，点击卡片选择</p>

<div class="cards">
  <!-- 选项A：可爱卡通风 -->
  <div class="card" data-choice="a" onclick="toggleSelect(this)">
    <div class="card-image" style="background: linear-gradient(135deg, #FFE66D, #FF6B6B); padding: 24px; text-align: center;">
      <div style="font-size: 48px; margin-bottom: 8px;">🌈</div>
      <div style="display: flex; justify-content: center; gap: 16px; margin-bottom: 12px;">
        <div style="width: 60px; height: 60px; border-radius: 50%; border: 4px dashed #fff; display: flex; align-items: center; justify-content: center; font-size: 24px;">⭕</div>
        <div style="width: 0; height: 0; border-left: 35px solid transparent; border-right: 35px solid transparent; border-bottom: 60px solid rgba(255,255,255,0.6);"></div>
        <div style="width: 55px; height: 55px; border: 4px dashed #fff; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px;">⬜</div>
      </div>
      <div style="background: rgba(255,255,255,0.3); border-radius: 20px; padding: 8px 16px; font-size: 18px; font-weight: bold; color: #fff;">
        相似度 92% 🎉
      </div>
    </div>
    <div class="card-body">
      <h3>A. 可爱卡通风</h3>
      <p>圆角、鲜艳色彩、卡通元素、大字体，适合吸引儿童和年轻用户。活泼有趣，色彩丰富。</p>
    </div>
  </div>

  <!-- 选项B：简约现代风 -->
  <div class="card" data-choice="b" onclick="toggleSelect(this)">
    <div class="card-image" style="background: linear-gradient(135deg, #0f0f23, #1a1a3e); padding: 24px; text-align: center;">
      <div style="display: flex; justify-content: center; gap: 16px; margin-bottom: 16px;">
        <div style="width: 60px; height: 60px; border-radius: 50%; border: 2px solid #64ffda;"></div>
        <div style="width: 0; height: 0; border-left: 35px solid transparent; border-right: 35px solid transparent; border-bottom: 60px solid rgba(100,255,218,0.3); margin-top: 2px;"></div>
        <div style="width: 56px; height: 56px; border: 2px solid #64ffda;"></div>
      </div>
      <div style="display: flex; justify-content: center; gap: 8px; align-items: center;">
        <div style="background: rgba(100,255,218,0.15); border: 1px solid rgba(100,255,218,0.3); border-radius: 8px; padding: 8px 20px;">
          <span style="color: #64ffda; font-size: 24px; font-weight: 300;">92%</span>
          <span style="color: rgba(255,255,255,0.5); font-size: 12px; margin-left: 4px;">MATCH</span>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>B. 简约现代风（暗色主题）</h3>
      <p>深色背景、霓虹色线条、极简 UI、科技感十足。优雅高级，适合全年龄段审美。</p>
    </div>
  </div>

  <!-- 选项C：手绘涂鸦风 -->
  <div class="card" data-choice="c" onclick="toggleSelect(this)">
    <div class="card-image" style="background: #FFFEF2; padding: 24px; text-align: center; position: relative;">
      <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: repeating-linear-gradient(transparent, transparent 27px, #e8e8e8 28px); opacity: 0.3;"></div>
      <div style="position: relative; z-index: 1;">
        <div style="display: flex; justify-content: center; gap: 16px; margin-bottom: 16px;">
          <svg width="60" height="60" viewBox="0 0 60 60"><circle cx="30" cy="30" r="26" fill="none" stroke="#333" stroke-width="2.5" stroke-dasharray="4,3" /></svg>
          <svg width="60" height="60" viewBox="0 0 60 60"><polygon points="30,4 56,56 4,56" fill="none" stroke="#FF6347" stroke-width="2.5" stroke-dasharray="4,3" /></svg>
          <svg width="60" height="60" viewBox="0 0 60 60"><rect x="5" y="5" width="50" height="50" fill="none" stroke="#4169E1" stroke-width="2.5" stroke-dasharray="4,3" /></svg>
        </div>
        <div style="background: #FFF9E0; border: 2px dashed #D4A574; border-radius: 12px; padding: 8px 16px; font-family: 'Comic Sans MS', cursive; font-size: 16px; color: #6B4E37;">
          ✏️ 相似度 92%
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>C. 手绘涂鸦风</h3>
      <p>纸张纹理背景、铅笔/蜡笔笔触、手写字体、草稿本感觉。温馨自然，契合"徒手画"的主题。</p>
    </div>
  </div>
</div>
